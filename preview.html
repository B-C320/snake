<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
    body {
        background: #111;
        color: white;
        text-align: center;
        font-family: monospace;
    }
    canvas {
        background: black;
        margin-top: 20px;
        border: 2px solid white;
    }
</style>
</head>
<body>

<h1>Snake</h1>
<p>Arrow Keys to Move | Space to Restart</p>
<canvas id="game"></canvas>

<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = 20;
canvas.width = canvas.height = gridSize * tileCount;

let snake;
let direction;
let food;
let score;
let gameInterval;
let gameOver;

function initGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    direction = { x: 1, y: 0 };
    score = 0;
    gameOver = false;
    spawnFood();
}

function spawnFood() {
    while (true) {
        const newFood = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        if (!snake.some(segment => segment.x === newFood.x && segment.y === newFood.y)) {
            food = newFood;
            return;
        }
    }
}

function update() {
    if (gameOver) return;

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount ||
        snake.some(segment => segment.x === head.x && segment.y === head.y)
    ) {
        gameOver = true;
        return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        spawnFood();
    } else {
        snake.pop();
    }
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "red";
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

    ctx.fillStyle = "lime";
    snake.forEach(segment => {
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize, gridSize);
    });

    ctx.fillStyle = "white";
    ctx.fillText("Score: " + score, 10, 15);

    if (gameOver) {
        ctx.fillStyle = "white";
        ctx.fillText("GAME OVER - Press Space", 40, canvas.height / 2);
    }
}

function gameLoop() {
    update();
    draw();
}

document.addEventListener("keydown", (e) => {
    const key = e.key;

    const moves = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
    };

    if (moves[key]) {
        const newDir = moves[key];
        if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
            direction = newDir;
        }
    }

    if (key === " " && gameOver) {
        initGame();
    }
});

initGame();
gameInterval = setInterval(gameLoop, 100);
</script>

</body>
</html>
