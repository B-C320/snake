<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
    body {
        background: radial-gradient(circle at center, #1a1a1a, #000);
        color: white;
        text-align: center;
        font-family: monospace;
    }
    canvas {
        background: #000;
        margin-top: 20px;
        border: 3px solid white;
        box-shadow: 0 0 20px #00ff00;
    }
</style>
</head>
<body>

<h1>Snake</h1>
<p>Arrow Keys to Move | Space to Restart</p>
<canvas id="game"></canvas>

<script>
"use strict";

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gridSize = 20;
const tileCount = 20;
const speed = 120; // slightly slower

canvas.width = canvas.height = gridSize * tileCount;

let snake;
let direction;
let food;
let score;
let highScore = localStorage.getItem("snakeHighScore") || 0;
let gameOver;

function initGame() {
    snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
    ];
    direction = { x: 1, y: 0 };
    score = 0;
    gameOver = false;
    spawnFood();
}

function spawnFood() {
    while (true) {
        const newFood = {
            x: Math.floor(Math.random() * tileCount),
            y: Math.floor(Math.random() * tileCount)
        };

        if (!snake.some(s => s.x === newFood.x && s.y === newFood.y)) {
            food = newFood;
            return;
        }
    }
}

function update() {
    if (gameOver) return;

    const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
    };

    if (
        head.x < 0 ||
        head.y < 0 ||
        head.x >= tileCount ||
        head.y >= tileCount ||
        snake.some(s => s.x === head.x && s.y === head.y)
    ) {
        gameOver = true;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem("snakeHighScore", highScore);
        }
        return;
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
        score++;
        spawnFood();
    } else {
        snake.pop();
    }
}

function drawGrid() {
    ctx.strokeStyle = "#111";
    for (let i = 0; i < tileCount; i++) {
        ctx.beginPath();
        ctx.moveTo(i * gridSize, 0);
        ctx.lineTo(i * gridSize, canvas.height);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(0, i * gridSize);
        ctx.lineTo(canvas.width, i * gridSize);
        ctx.stroke();
    }
}

function drawFood() {
    ctx.fillStyle = "red";
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize, gridSize);

    ctx.fillStyle = "orange";
    ctx.fillRect(
        food.x * gridSize + 5,
        food.y * gridSize + 5,
        gridSize - 10,
        gridSize - 10
    );
}

function drawSnake() {
    snake.forEach((segment, index) => {
        if (index === 0) {
            ctx.fillStyle = "#00aa00";
        } else {
            ctx.fillStyle = "#00ff00";
        }

        ctx.fillRect(
            segment.x * gridSize,
            segment.y * gridSize,
            gridSize,
            gridSize
        );
    });
}

function drawOverlay() {
    if (!gameOver) return;

    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";
    ctx.font = "20px monospace";
    ctx.fillText("GAME OVER", canvas.width / 2 - 70, canvas.height / 2 - 10);
    ctx.fillText("Press Space to Restart", canvas.width / 2 - 120, canvas.height / 2 + 20);
}

function drawUI() {
    ctx.fillStyle = "white";
    ctx.font = "14px monospace";
    ctx.fillText("Score: " + score, 10, 15);
    ctx.fillText("High Score: " + highScore, 10, 30);
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    drawGrid();
    drawFood();
    drawSnake();
    drawUI();
    drawOverlay();
}

function gameLoop() {
    update();
    draw();
}

document.addEventListener("keydown", (e) => {
    const moves = {
        ArrowUp: { x: 0, y: -1 },
        ArrowDown: { x: 0, y: 1 },
        ArrowLeft: { x: -1, y: 0 },
        ArrowRight: { x: 1, y: 0 }
    };

    if (moves[e.key]) {
        const newDir = moves[e.key];
        if (newDir.x !== -direction.x || newDir.y !== -direction.y) {
            direction = newDir;
        }
    }

    if (e.key === " " && gameOver) {
        initGame();
    }
});

initGame();
setInterval(gameLoop, speed);
</script>

</body>
</html>
